<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    
    <!-- iOS/Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ÆTHERA">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDkwOTBiIi8+PHBvbHlnb24gcG9pbnRzPSI0MCwzMCA3MCw1MCA0MCw3MCIgZmlsbD0iI2U1MDkxNCIvPjwvc3ZnPg==">
    
    <!-- Inline PWA Manifest -->
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22AlanFlix%22%2C%22short_name%22%3A%22AlanFlix%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2309090b%22%2C%22theme_color%22%3A%22%2309090b%22%2C%22description%22%3A%22AlanFlix%20Streaming%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bbase64%2CPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMDkwOTBiIi8%2BPHBvbHlnb24gcG9pbnRzPSI0MCwzMCA3MCw1MCA0MCw3MCIgZmlsbD0iI2U1MDkxNCIvPjwvc3ZnPg%3D%3D%22%2C%22sizes%22%3A%22192x192%20512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <title>ÆTHERA</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset('react-classic', {
        presets: [ [Babel.availablePresets.react, { runtime: 'classic' }] ]
      });
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect, useRef, useCallback } = React;

      // SVG Icons
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
      const ChevronDown = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
      const ArrowUp = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>);
      const Star = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);
      const CheckCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
      const Clock = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
      const ShareIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>);
      const TvIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>);
      const ZapIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>);

      // TMDB Constants
      const TMDB_API_KEY = '7824742e1dec4143905440c3b49638a6';
      const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
      const TMDB_IMG_BASE = 'https://image.tmdb.org/t/p/w780';

      const EN_GENRES = { 'Action': 28, 'Comedy': 35, 'Sci-Fi': 878, 'Horror': 27, 'Romance': 10749, 'Thriller': 53, 'Drama': 18, 'Animation': 16, 'Crime': 80, 'Mystery': 9648 };
      const RU_GENRES = { 'Боевик': 28, 'Комедия': 35, 'Фантастика': 878, 'Ужасы': 27, 'Мелодрама': 10749, 'Триллер': 53, 'Драма': 18, 'Мультфильм': 16, 'Криминал': 80, 'Детектив': 9648 };

      const EN_TV_GENRES = { 'Action & Adventure': 10759, 'Comedy': 35, 'Sci-Fi & Fantasy': 10765, 'Drama': 18, 'Animation': 16, 'Crime': 80, 'Mystery': 9648 };
      const RU_TV_GENRES = { 'Боевик и Приключения': 10759, 'Комедия': 35, 'Фантастика': 10765, 'Драма': 18, 'Мультфильм': 16, 'Криминал': 80, 'Детектив': 9648 };

      const EN_ANIME_GENRES = { 'Action': 10759, 'Comedy': 35, 'Sci-Fi & Fantasy': 10765, 'Drama': 18, 'Mystery': 9648 };
      const RU_ANIME_GENRES = { 'Экшен': 10759, 'Комедия': 35, 'Фэнтези': 10765, 'Драма': 18, 'Детектив': 9648 };

      const mapTMDBItem = (item, defaultType = 'movie') => {
          const isAnime = item.original_language === 'ja' && ((item.genre_ids && item.genre_ids.includes(16)) || (item.genres && item.genres.some(g => g.id === 16)));
          return {
              id: item.id, Title: item.title || item.name,
              Year: (item.release_date || item.first_air_date || 'N/A').substring(0, 4),
              Poster: item.poster_path ? `${TMDB_IMG_BASE}${item.poster_path}` : 'N/A',
              Type: item.media_type || defaultType, imdbRating: item.vote_average ? item.vote_average.toFixed(1) : 'N/A',
              Overview: item.overview || '', isAnime: isAnime
          };
      };

      function useInfiniteScroll(callback, hasMore, loading) {
        const observer = useRef();
        const lastElementRef = useCallback(node => {
          if (loading) return;
          if (observer.current) observer.current.disconnect();
          observer.current = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && hasMore) callback();
          }, { rootMargin: '200px' });
          if (node) observer.current.observe(node);
        }, [loading, hasMore, callback]);
        return lastElementRef;
      }

      function App() {
        const [appLang, setAppLang] = useState(() => { try { return localStorage.getItem('alanflix_lang') || 'en-US'; } catch { return 'en-US'; } });
        const [introFinished, setIntroFinished] = useState(false);
        
        // Navigation & Section State
        const [activeTab, setActiveTab] = useState('home'); // 'home', 'movie', 'series', 'anime'
        const [activeGenre, setActiveGenre] = useState(null); 
        
        // Search State
        const [query, setQuery] = useState("");
        const [debouncedQuery, setDebouncedQuery] = useState("");
        const [searchType, setSearchType] = useState('movie'); 
        const [isSearchFocused, setIsSearchFocused] = useState(false);
        const searchContainerRef = useRef(null);
        
        // Data State
        const [gridItems, setGridItems] = useState([]); // Unified infinite grid
        const [homeData, setHomeData] = useState([]); // Trending carousels (only for Home)
        
        // Pagination & Loading States
        const [page, setPage] = useState(1);
        const [hasMore, setHasMore] = useState(false);
        const [loading, setLoading] = useState(true);
        const [loadingHome, setLoadingHome] = useState(true);
        const [error, setError] = useState(null);

        // Player States
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [movieDetails, setMovieDetails] = useState(null);
        const [recommendations, setRecommendations] = useState([]);
        const [showEpisodes, setShowEpisodes] = useState([]);
        const [showSeasons, setShowSeasons] = useState([]);
        const [selectedSeason, setSelectedSeason] = useState(1);
        const [loadingEpisodes, setLoadingEpisodes] = useState(false);
        const [selectedEpisodeData, setSelectedEpisodeData] = useState(null); 
        
        const [showBackToTop, setShowBackToTop] = useState(false);
        const [shareText, setShareText] = useState(appLang === 'ru-RU' ? 'Поделиться' : 'Share');

        const [watchedHistory, setWatchedHistory] = useState(() => {
           try { const data = JSON.parse(localStorage.getItem('alanflix_history')); return Array.isArray(data) ? data : []; } catch { return []; }
        });

        // 1. АНТИ-РЕДИРЕКТ ЗАЩИТА НА УРОВНЕ ОКНА (Window BeforeUnload Hook)
        useEffect(() => {
            const handleBeforeUnload = (e) => {
                if (selectedMovie) {
                    e.preventDefault();
                    e.returnValue = ''; 
                    return '';
                }
            };
            window.addEventListener('beforeunload', handleBeforeUnload);
            return () => window.removeEventListener('beforeunload', handleBeforeUnload);
        }, [selectedMovie]);

        // Click Outside Listener for Search
        useEffect(() => {
            const handleClickOutside = (event) => {
                if (searchContainerRef.current && !searchContainerRef.current.contains(event.target)) {
                    setIsSearchFocused(false);
                }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        const toggleLanguage = () => {
           const newLang = appLang === 'en-US' ? 'ru-RU' : 'en-US';
           setAppLang(newLang);
           try { localStorage.setItem('alanflix_lang', newLang); } catch(e){}
        };

        const markWatched = (item) => {
           setWatchedHistory(prev => {
              const safePrev = Array.isArray(prev) ? prev : [];
              const updated = [item, ...safePrev.filter(m => m.id !== item.id)].slice(0, 15);
              try { localStorage.setItem('alanflix_history', JSON.stringify(updated)); } catch(e){}
              return updated;
           });
        };

        const isWatched = (id) => (Array.isArray(watchedHistory) ? watchedHistory : []).some(m => m.id === id);

        const updateURL = (params) => {
          const url = new URL(window.location);
          url.search = '';
          Object.keys(params).forEach(key => { if (params[key]) url.searchParams.set(key, params[key]); });
          window.history.pushState({}, '', url);
        };

        // Unified Grid Fetcher
        const fetchGridData = async (pageNum, tab, genre, q, typeToggle, isNew = false) => {
           if (isNew) { setLoading(true); setGridItems([]); setError(null); }
           try {
              let url = '';
              let targetType = 'movie';

              if (q) {
                  const endpt = (typeToggle === 'series' || typeToggle === 'anime') ? 'search/tv' : 'search/movie';
                  targetType = typeToggle === 'anime' ? 'series' : typeToggle;
                  url = `${TMDB_BASE_URL}/${endpt}?api_key=${TMDB_API_KEY}&language=${appLang}&query=${encodeURIComponent(q)}&page=${pageNum}`;
              } else {
                  targetType = (tab === 'anime' || tab === 'series') ? 'series' : 'movie';
                  if (tab === 'anime') {
                     let genreId = '';
                     if (genre && genre !== 'All Anime' && genre !== 'Все Аниме') {
                        const dict = appLang === 'ru-RU' ? RU_ANIME_GENRES : EN_ANIME_GENRES;
                        genreId = dict[genre] ? `,${dict[genre]}` : '';
                     }
                     url = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&language=${appLang}&with_genres=16${genreId}&with_original_language=ja&page=${pageNum}&sort_by=popularity.desc`;
                  } else if (tab === 'series') {
                     const dict = appLang === 'ru-RU' ? RU_TV_GENRES : EN_TV_GENRES;
                     const genreId = genre ? dict[genre] : '';
                     url = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&language=${appLang}${genreId ? `&with_genres=${genreId}` : ''}&page=${pageNum}&sort_by=popularity.desc&without_keywords=210024`;
                  } else {
                     const dict = appLang === 'ru-RU' ? RU_GENRES : EN_GENRES;
                     const genreId = genre ? dict[genre] : '';
                     url = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=${appLang}${genreId ? `&with_genres=${genreId}` : ''}&page=${pageNum}&sort_by=popularity.desc&without_keywords=210024`;
                  }
              }
              
              const res = await fetch(url);
              const data = await res.json();
              
              let newItems = [];
              if (data.results && data.results.length > 0) {
                 newItems = data.results.map(m => mapTMDBItem(m, targetType));
                 const effectiveType = q ? typeToggle : tab;
                 if (effectiveType === 'anime') newItems = newItems.filter(m => m.isAnime);
                 else newItems = newItems.filter(m => !m.isAnime);
              }

              if (newItems.length > 0) {
                 setGridItems(prev => isNew ? newItems : [...prev, ...newItems]);
                 setHasMore(pageNum < (data.total_pages || 1));
              } else {
                 if (isNew) setError(appLang === 'ru-RU' ? 'Ничего не найдено.' : 'No titles found.');
                 setHasMore(false);
              }
           } catch (err) {
              if (isNew) setError(appLang === 'ru-RU' ? 'Ошибка загрузки.' : 'Failed to fetch.');
           } finally { setLoading(false); }
        };

        const fetchHomeCarousels = async () => {
          setLoadingHome(true);
          try {
            const [trendingMov, trendingTv, trendingAnime] = await Promise.all([
              fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/trending/tv/week?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&language=${appLang}&with_genres=16&with_original_language=ja&sort_by=popularity.desc`).then(r => r.json())
            ]);
            setHomeData([
              { title: appLang === 'ru-RU' ? 'Популярные Фильмы' : 'Trending Movies', movies: trendingMov.results.map(m => mapTMDBItem(m, 'movie')).filter(m => !m.isAnime) },
              { title: appLang === 'ru-RU' ? 'Популярные Сериалы' : 'Trending TV Shows', movies: trendingTv.results.map(s => mapTMDBItem(s, 'series')).filter(s => !s.isAnime) },
              { title: appLang === 'ru-RU' ? 'Популярное Аниме' : 'Trending Anime', movies: trendingAnime.results.map(s => mapTMDBItem(s, 'series')) }
            ]);
          } catch (err) {} finally { setLoadingHome(false); }
        };

        // Initialize / Handle URL Routing
        useEffect(() => {
          const handleUrlChange = () => {
            const params = new URLSearchParams(window.location.search);
            const v = params.get('v');
            const q = params.get('q');
            const g = params.get('g');
            const t = params.get('t') || 'home';
            const type = params.get('type') || 'movie';
            
            setSearchType(type);

            if (v) {
               fetch(`${TMDB_BASE_URL}/${type === 'series' || type === 'anime' ? 'tv' : 'movie'}/${v}?api_key=${TMDB_API_KEY}&language=${appLang}`)
                 .then(res => res.json()).then(m => { if(m.id) playMovie(mapTMDBItem(m, type === 'anime' ? 'series' : type), true); });
            } else if (q) {
               setQuery(q); setDebouncedQuery(q); setActiveTab(t); setActiveGenre(null); setSelectedMovie(null);
               fetchGridData(1, t, null, q, type, true);
            } else {
               setActiveTab(t); setActiveGenre(g); setQuery(''); setDebouncedQuery(''); setSelectedMovie(null);
               fetchGridData(1, t, g, '', type, true);
               if (t === 'home' && !g && homeData.length === 0) fetchHomeCarousels();
            }
          };

          window.addEventListener('popstate', handleUrlChange);
          if (introFinished) handleUrlChange(); 
          return () => window.removeEventListener('popstate', handleUrlChange);
        }, [appLang, introFinished]);

        // Debounce Query Input
        useEffect(() => {
          const timer = setTimeout(() => setDebouncedQuery(query), 500);
          return () => clearTimeout(timer);
        }, [query]);

        // Execute Search automatically on typing or type toggle change
        useEffect(() => {
          if (!introFinished) return;
          if (debouncedQuery.trim()) {
             setActiveGenre(null); setSelectedMovie(null); setPage(1);
             updateURL({ q: debouncedQuery, type: searchType, t: activeTab });
             fetchGridData(1, activeTab, null, debouncedQuery, searchType, true);
          } else if (debouncedQuery === '' && query === '' && !selectedMovie) {
             // If search cleared, revert to normal tab view
             updateURL(activeTab === 'home' && !activeGenre ? {} : { t: activeTab, g: activeGenre });
             fetchGridData(1, activeTab, activeGenre, '', searchType, true);
             if (activeTab === 'home' && homeData.length === 0) fetchHomeCarousels();
          }
        }, [debouncedQuery, searchType]);

        useEffect(() => {
           const handleScroll = () => setShowBackToTop(window.scrollY > 500);
           window.addEventListener('scroll', handleScroll);
           return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        useEffect(() => {
          const timer = setTimeout(() => setIntroFinished(true), 4000); 
          return () => clearTimeout(timer);
        }, []);

        // Actions
        const handleTabClick = (tab) => {
           setActiveTab(tab); setActiveGenre(null); setQuery(''); setDebouncedQuery(''); setSelectedMovie(null); setPage(1);
           updateURL(tab === 'home' ? {} : { t: tab });
           fetchGridData(1, tab, null, '', searchType, true);
           if (tab === 'home' && homeData.length === 0) fetchHomeCarousels();
        };

        const handleGenreSelect = (genre) => {
           setActiveGenre(genre); setQuery(''); setDebouncedQuery(''); setSelectedMovie(null); setPage(1);
           updateURL({ t: activeTab, g: genre });
           fetchGridData(1, activeTab, genre, '', searchType, true);
        };

        // Infinite Scroll Callback
        const loadMoreData = useCallback(() => {
           if (loading || !hasMore) return;
           const nextPage = page + 1;
           setPage(nextPage);
           fetchGridData(nextPage, activeTab, activeGenre, debouncedQuery, searchType, false);
        }, [page, loading, hasMore, activeTab, activeGenre, debouncedQuery, searchType]);

        const lastElementRef = useInfiniteScroll(loadMoreData, hasMore, loading);

        // Player Actions
        const playMovie = async (movie, skipUrlUpdate = false) => {
          setSelectedMovie(movie); setSelectedEpisodeData(null); 
          if (movie.Type !== 'series') markWatched(movie);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          if (!skipUrlUpdate) updateURL({ v: movie.id, type: movie.isAnime ? 'anime' : movie.Type });
          fetchMovieDetails(movie.id, movie.Type);
          if (movie.Type === 'series') fetchTVSeasons(movie.id);
        };

        const fetchMovieDetails = async (tmdbID, type) => {
           try {
              const [detailsRes, recsRes] = await Promise.all([
                 fetch(`${TMDB_BASE_URL}/${type === 'series' ? 'tv' : 'movie'}/${tmdbID}?api_key=${TMDB_API_KEY}&language=${appLang}&append_to_response=credits`),
                 fetch(`${TMDB_BASE_URL}/${type === 'series' ? 'tv' : 'movie'}/${tmdbID}/recommendations?api_key=${TMDB_API_KEY}&language=${appLang}`)
              ]);
              const details = await detailsRes.json();
              const recs = await recsRes.json();
              setMovieDetails(details);
              if (recs.results) setRecommendations(recs.results.slice(0, 15).map(m => mapTMDBItem(m, type)));
           } catch(e) {}
        };

        const fetchTVSeasons = async (tmdbID) => {
          setLoadingEpisodes(true);
          try {
            const showDataRes = await fetch(`${TMDB_BASE_URL}/tv/${tmdbID}?api_key=${TMDB_API_KEY}&language=${appLang}`);
            const showData = await showDataRes.json();
            const validSeasons = showData.seasons.filter(s => s.season_number > 0);
            setShowSeasons(validSeasons.map(s => s.season_number));
            if (validSeasons.length > 0) {
               setSelectedSeason(validSeasons[0].season_number);

                            <button 
                               onClick={() => handleGenreSelect(null)} 
                               className={`px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-bold whitespace-nowrap snap-start border transition-colors shadow-sm ${!activeGenre ? 'bg-white text-black border-white' : 'bg-zinc-900/80 text-zinc-400 border-zinc-800 hover:text-white hover:border-zinc-600'}`}
                            >
                               {appLang === 'ru-RU' ? 'Все жанры' : 'All Genres'}
                            </button>
                            {activeGenreList.map(g => (
                                <button 
                                   key={g} 
                                   onClick={() => handleGenreSelect(g)} 
                                   className={`px-4 py-1.5 sm:py-2 rounded-full text-xs sm:text-sm font-bold whitespace-nowrap snap-start border transition-colors shadow-sm ${activeGenre === g ? 'bg-white text-black border-white' : 'bg-zinc-900/80 text-zinc-400 border-zinc-800 hover:text-white hover:border-zinc-600'}`}
                                >
                                   {g}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* DYNAMIC HEADER TEXT */}
                    {!loading && gridItems.length > 0 && (
                      <h3 className="text-xl sm:text-2xl font-black text-white mb-6 pl-2 sm:pl-4 border-l-4 border-red-600 animate-in fade-in">
                        {isSearching ? (
                          <>{appLang === 'ru-RU' ? 'Результаты для' : 'Results for'} <span className="text-zinc-400 font-medium">"{debouncedQuery}"</span></>
                        ) : activeGenre ? (
                          <>{activeGenre} <span className="text-zinc-500 font-medium">{activeTab === 'anime' ? (appLang === 'ru-RU' ? 'Аниме' : 'Anime') : activeTab === 'series' ? (appLang === 'ru-RU' ? 'Сериалы' : 'Series') : (appLang === 'ru-RU' ? 'Фильмы' : 'Movies')}</span></>
                        ) : activeTab === 'home' ? (
                          appLang === 'ru-RU' ? 'Рекомендуем' : 'Discover Feed'
                        ) : activeTab === 'anime' ? (
                          appLang === 'ru-RU' ? 'Популярное Аниме' : 'Popular Anime'
                        ) : activeTab === 'series' ? (
                          appLang === 'ru-RU' ? 'Популярные Сериалы' : 'Popular TV Shows'
                        ) : (
                          appLang === 'ru-RU' ? 'Популярные Фильмы' : 'Popular Movies'
                        )}
                      </h3>
                    )}

                    {/* HOME PAGE CAROUSELS (Only shown on 'Home' when no genre is selected and not searching) */}
                    {activeTab === 'home' && !activeGenre && !isSearching && homeData.length > 0 && (
                        <div className="space-y-10 sm:space-y-14 mb-10 border-b border-zinc-900 pb-10">
                             {/* Continue Watching */}
                             {watchedHistory.length > 0 && (
                                <div className="w-full">
                                   <h3 className="text-xl sm:text-2xl font-black text-white mb-4 sm:mb-6 flex items-center gap-3 pl-2 sm:pl-4 border-l-4 border-red-600">{appLang === 'ru-RU' ? 'Продолжить просмотр' : 'Continue Watching'}</h3>
                                   <div className="flex gap-4 sm:gap-5 overflow-x-auto pb-6 px-2 sm:px-4 snap-x snap-mandatory custom-scrollbar">
                                     {watchedHistory.map((movie, index) => (
                                       <div key={`hist-${movie.id}-${index}`} className="movie-card flex-none w-44 sm:w-56 md:w-64 relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 snap-start shadow-lg ring-1 ring-zinc-800" onClick={() => playMovie(movie)}>
                                         <div className="aspect-[16/9] w-full relative">
                                           {movie.Poster !== 'N/A' ? (<img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" loading="lazy" />) : (<div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4"><Film className="w-10 h-10 mb-2 opacity-30" /></div>)}
                                           <div className="absolute inset-0 flex flex-col justify-end p-3 bg-gradient-to-t from-black via-black/50 to-transparent">
                                              <h4 className="text-white font-bold truncate text-sm sm:text-base drop-shadow-md">{movie.Title}</h4>
                                              <p className="text-zinc-300 text-xs font-medium flex items-center gap-1 mt-1"><Play className="w-3 h-3 text-red-500" fill="currentColor" /> {movie.isAnime ? 'Anime' : movie.Type === 'series' ? 'TV' : 'Movie'}</p>
                                           </div>
                                         </div>
                                       </div>
                                     ))}
                                   </div>
                                 </div>
                             )}

                             {/* Trending Categories */}
                             {homeData.map((category, idx) => (
                               category.movies?.length > 0 && (
                                 <div key={idx} className="w-full animate-in fade-in duration-700" style={{ animationDelay: `${idx * 150}ms` }}>
                                   <h3 className="text-xl sm:text-2xl font-black text-white mb-4 sm:mb-6 flex items-center gap-3 pl-2 sm:pl-4 border-l-4 border-red-600">{category.title}</h3>
                                   <div className="flex gap-4 sm:gap-5 overflow-x-auto pb-6 px-2 sm:px-4 snap-x snap-mandatory custom-scrollbar">
                                     {category.movies.map((movie, index) => (
                                       <div key={`trend-${movie.id}-${index}`} className="movie-card flex-none w-36 sm:w-44 md:w-48 lg:w-56 relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 snap-start shadow-lg ring-1 ring-zinc-800" onClick={() => playMovie(movie)}>
                                         <div className="aspect-[2/3] w-full relative">
                                           {movie.Poster !== 'N/A' ? (<img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover" loading="lazy" />) : (<div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4"><Film className="w-10 h-10 mb-2 opacity-30" /></div>)}
                                           <div className="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1 border border-white/10 z-10 shadow-lg"><Star className="w-3.5 h-3.5 text-yellow-500" /><span className="text-white text-xs font-bold">{movie.imdbRating}</span></div>
                                           {isWatched(movie.id) && (<div className="absolute top-2 left-2 bg-black/60 backdrop-blur-md p-1.5 rounded-full border border-green-500/30 z-10 shadow-lg" title="Watched"><CheckCircle className="w-4 h-4 text-green-500" /></div>)}
                                         </div>
                                         <div className="p-3 sm:p-4 bg-zinc-900">
                                           <h4 className="text-white font-bold truncate text-xs sm:text-sm mb-1">{movie.Title}</h4>
                                           <div className="flex items-center justify-between"><p className="text-zinc-500 text-[10px] sm:text-xs font-medium">{movie.Year}</p><span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded-sm ${movie.isAnime ? 'bg-yellow-900/50 text-yellow-500' : movie.Type === 'series' ? 'bg-blue-900/50 text-blue-400' : 'bg-red-900/50 text-red-400'}`}>{movie.isAnime ? 'Anime' : movie.Type === 'series' ? 'TV' : 'Movie'}</span></div>
                                         </div>
                                       </div>
                                     ))}
                                   </div>
                                 </div>
                               )
                             ))}
                        </div>
                    )}

                    {/* MAIN INFINITE GRID (Used for Sections, Genres, and Search Results) */}
                    {gridItems.length > 0 && (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 gap-y-8 sm:gap-y-10 px-2 sm:px-4">
                          {gridItems.map((movie, index) => (
                            <div key={`grid-${movie.id}-${index}`} className="movie-card relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 shadow-lg ring-1 ring-zinc-800" onClick={() => playMovie(movie)}>
                              <div className="aspect-[2/3] w-full relative">
                                {movie.Poster !== 'N/A' ? (<img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover" loading="lazy" />) : (<div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4 text-center"><Film className="w-12 h-12 mb-2 opacity-30" /><span className="text-[10px] font-bold tracking-widest">NO POSTER</span></div>)}
                                <div className="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1 border border-white/10 z-10 shadow-lg"><Star className="w-3.5 h-3.5 text-yellow-500" /><span className="text-white text-xs font-bold">{movie.imdbRating}</span></div>
                                {isWatched(movie.id) && (<div className="absolute top-2 left-2 bg-black/60 backdrop-blur-md p-1.5 rounded-full border border-green-500/30 z-10 shadow-lg" title="Watched"><CheckCircle className="w-4 h-4 text-green-500" /></div>)}
                              </div>
                              <div className="p-3 sm:p-4 bg-zinc-900">
                                <h4 className="text-white font-bold truncate text-sm mb-1" title={movie.Title}>{movie.Title}</h4>
                                <div className="flex items-center justify-between">
                                   <p className="text-zinc-400 text-[10px] sm:text-xs font-medium">{movie.Year}</p>
                                   {isSearching && (
                                       <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-sm ${movie.isAnime ? 'bg-yellow-900/50 text-yellow-500' : movie.Type === 'series' ? 'bg-blue-900/50 text-blue-400' : 'bg-red-900/50 text-red-400'}`}>{movie.isAnime ? 'Anime' : movie.Type === 'series' ? 'TV' : 'Movie'}</span>
                                   )}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                    )}

                    {/* LOADING INDICATORS */}
                    {(loading || loadingHome) && gridItems.length === 0 && !error && (
                      <div className="flex flex-col items-center justify-center py-32">
                        <div className="relative w-16 h-16 sm:w-20 sm:h-20"><div className="absolute inset-0 border-4 border-zinc-800 rounded-full"></div><div className="absolute inset-0 border-4 border-white/80 rounded-full border-t-transparent animate-spin"></div></div>
                        <p className="mt-6 text-zinc-400 font-bold tracking-widest uppercase text-xs sm:text-sm">{appLang === 'ru-RU' ? 'Сборка библиотеки...' : 'Fetching DB...'}</p>
                      </div>
                    )}

                    {hasMore && gridItems.length > 0 && (
                       <div ref={lastElementRef} className="py-16 flex flex-col items-center justify-center">
                          <div className="animate-spin rounded-full h-8 w-8 sm:h-10 sm:w-10 border-b-2 border-white/80 mb-4"></div>
                          <span className="text-zinc-500 font-bold tracking-widest uppercase text-[10px] sm:text-xs">{appLang === 'ru-RU' ? 'Загрузка...' : 'Loading More...'}</span>
                       </div>
                    )}

                    {error && !loading && gridItems.length === 0 && (
                      <div className="flex flex-col items-center justify-center py-24 text-center">
                        <AlertCircle className="w-16 h-16 sm:w-20 sm:h-20 text-zinc-800 mb-6" />
                        <h3 className="text-2xl sm:text-3xl font-black text-white mb-3">{appLang === 'ru-RU' ? 'Ничего не найдено' : 'No Titles Found'}</h3>
                        <p className="text-zinc-500 font-medium max-w-sm sm:max-w-md text-sm sm:text-base">{error}</p>
                      </div>
                    )}

                  </div>
                )}
              </main>

              {/* Floating Back To Top */}
              {showBackToTop && (
                 <button onClick={scrollToTop} className="fixed right-6 p-3 sm:p-4 bg-zinc-800/90 text-white rounded-full shadow-lg border border-zinc-700 hover:bg-zinc-700 hover:scale-110 transition-all z-50 animate-in fade-in zoom-in duration-300 safe-fab backdrop-blur-md">
                    <ArrowUp className="w-5 h-5 sm:w-6 sm:h-6" />
                 </button>
              )}
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
    <script src="script.js"></script>
</body>
</html>
